<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Performance Predictor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      color: #fff;
    }
    h1 { font-size: 1.8rem; margin-bottom: 6px; color: #e0e7ff; }
    .subtitle { color: #94a3b8; font-size: 0.9rem; margin-bottom: 28px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    label { display: block; font-size: 0.78rem; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }
    select, input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border .2s;
    }
    select:focus, input:focus { border-color: #6366f1; }
    select option { background: #1a1a2e; }
    .scores { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-top: 4px; }
    button {
      margin-top: 24px;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
    }
    button:hover { opacity: .88; }
    #result {
      margin-top: 24px;
      padding: 20px;
      border-radius: 14px;
      display: none;
      text-align: center;
    }
    #result.pass { background: rgba(52,211,153,.15); border: 1px solid #34d399; }
    #result.fail { background: rgba(248,113,113,.15); border: 1px solid #f87171; }
    #result .verdict { font-size: 2rem; font-weight: 700; }
    #result .conf { font-size: 0.9rem; color: #cbd5e1; margin-top: 6px; }
  </style>
</head>
<body>
<div class="card">
  <h1>🎓 Student Performance Predictor</h1>
  <p class="subtitle">Predict whether a student will Pass or Fail based on demographics & scores</p>

  <div class="grid">
    <div>
      <label>Gender</label>
      <select id="gender">
        <option value="male">Male</option>
        <option value="female">Female</option>
      </select>
    </div>
    <div>
      <label>Race / Ethnicity</label>
      <select id="race">
        <option value="group A">Group A</option>
        <option value="group B">Group B</option>
        <option value="group C" selected>Group C</option>
        <option value="group D">Group D</option>
        <option value="group E">Group E</option>
      </select>
    </div>
    <div>
      <label>Lunch Type</label>
      <select id="lunch">
        <option value="standard" selected>Standard</option>
        <option value="free/reduced">Free / Reduced</option>
      </select>
    </div>
    <div>
      <label>Test Preparation</label>
      <select id="prep">
        <option value="none" selected>None</option>
        <option value="completed">Completed</option>
      </select>
    </div>
  </div>

  <div style="margin-top:16px">
    <label>Parental Education</label>
    <select id="edu">
      <option value="some high school">Some High School</option>
      <option value="high school">High School</option>
      <option value="some college" selected>Some College</option>
      <option value="associate's degree">Associate's Degree</option>
      <option value="bachelor's degree">Bachelor's Degree</option>
      <option value="master's degree">Master's Degree</option>
    </select>
  </div>

  <div class="scores" style="margin-top:16px">
    <div>
      <label>Math Score</label>
      <input type="number" id="math" min="0" max="100" value="65" />
    </div>
    <div>
      <label>Reading Score</label>
      <input type="number" id="reading" min="0" max="100" value="70" />
    </div>
    <div>
      <label>Writing Score</label>
      <input type="number" id="writing" min="0" max="100" value="68" />
    </div>
  </div>

  <button onclick="predict()">🔮 Predict Performance</button>

  <div id="result">
    <div class="verdict" id="verdict"></div>
    <div class="conf" id="conf"></div>
  </div>
</div>

<script>
async function predict() {
  const payload = {
    gender:              document.getElementById("gender").value,
    race_ethnicity:      document.getElementById("race").value,
    parental_education:  document.getElementById("edu").value,
    lunch:               document.getElementById("lunch").value,
    test_preparation:    document.getElementById("prep").value,
    math_score:          document.getElementById("math").value,
    reading_score:       document.getElementById("reading").value,
    writing_score:       document.getElementById("writing").value,
  };
  try {
    const res  = await fetch("/predict", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(payload) });
    const data = await res.json();
    const box  = document.getElementById("result");
    box.style.display = "block";
    box.className      = data.prediction === "Pass" ? "pass" : "fail";
    document.getElementById("verdict").textContent = data.prediction === "Pass" ? "✅ PASS" : "❌ FAIL";
    document.getElementById("conf").textContent    = `Confidence: ${data.confidence}%  |  Pass Probability: ${data.pass_prob}%`;
  } catch(e) {
    alert("Error: " + e.message);
  }
}
</script>
</body>
</html>
